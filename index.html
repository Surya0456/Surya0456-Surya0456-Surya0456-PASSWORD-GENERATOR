<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="./style.css">
    <!-- Load Inter font for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Secure Password Generator</h2>
            <p class="subtitle">Generate strong, secure passwords instantly</p>
            
            <form id="password-form">
                <div class="input-group">
                    <label for="length">Password Length</label>
                    <input type="number" id="length" name="length" placeholder="e.g., 16" min="1" max="128" value="12" required>
                </div>
                <button type="submit" class="generate-btn">Generate Password</button>
            </form>

            <div id="result-container" class="result-box" style="display: none;">
                <h3>Your Password</h3>
                <div class="password-display">
                    <code id="password-output"></code>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript to handle logic purely in the browser so Go Live works -->
    <script>
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const length = parseInt(document.getElementById('length').value);
            if (isNaN(length) || length <= 0) return;

            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+~`|}{[]:;?><,./-=';
            const allChars = lowercase + uppercase + numbers + symbols;

            let password = '';
            
            // Ensure at least one of each character type if length >= 4
            if (length >= 4) {
                password += lowercase[Math.floor(Math.random() * lowercase.length)];
                password += uppercase[Math.floor(Math.random() * uppercase.length)];
                password += numbers[Math.floor(Math.random() * numbers.length)];
                password += symbols[Math.floor(Math.random() * symbols.length)];
                
                for (let i = 4; i < length; i++) {
                    password += allChars[Math.floor(Math.random() * allChars.length)];
                }
                
                // Shuffle the resulting string
                password = password.split('').sort(() => 0.5 - Math.random()).join('');
            } else {
                for (let i = 0; i < length; i++) {
                    password += allChars[Math.floor(Math.random() * allChars.length)];
                }
            }

            document.getElementById('password-output').textContent = password;
            document.getElementById('result-container').style.display = 'block';
        });
    </script>
</body>
</html>
